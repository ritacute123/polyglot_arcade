<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Polyglot Arcade</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="setupScreen" class="workspace active" aria-labelledby="setupTitle">
        <div class="setup-panel">
          <div class="section-heading">
            <p class="eyebrow">Polyglot Arcade</p>
            <h1 id="setupTitle">Start session</h1>
          </div>
          <div class="control-grid">
            <label><span>Language</span><select id="languageSelect"></select></label>
            <label><span>Theme</span><select id="topicSelect"></select></label>
          </div>
          <div class="style-grid" id="styleGrid" aria-label="Gamification style"></div>
          <button id="startButton" class="primary-button" type="button"><span aria-hidden="true">Play</span>Start challenge</button>
        </div>

        <aside class="level-panel" aria-label="CEFR level guide">
          <div class="section-heading">
            <p class="eyebrow">Feedback Scale</p>
            <h2>CEFR Pre-A1 to C2</h2>
          </div>
          <div class="level-ladder" id="levelLadder"></div>
        </aside>
      </section>

      <section id="gameScreen" class="workspace" aria-labelledby="gameTitle">
        <div class="game-stage">
          <div class="game-header">
            <div>
              <p class="eyebrow" id="roundMeta">Round 1 of 5</p>
              <h2 id="gameTitle">Challenge</h2>
            </div>
            <div class="scoreboard">
              <div><span id="scoreValue">0</span><small>XP</small></div>
              <div><span id="streakValue">0</span><small>Streak</small></div>
              <div><span id="timerValue">--</span><small>Timer</small></div>
            </div>
          </div>
          <div class="prompt-card">
            <div id="linguisticChip" class="linguistic-chip"></div>
            <p id="promptText"></p>
            <div id="choiceArea" class="choice-area"></div>
            <div class="voice-console" aria-live="polite">
              <button id="speakButton" class="mic-button" type="button">
                <span aria-hidden="true">REC</span>
                Speak answer
              </button>
              <div id="voiceHalo" class="voice-halo" aria-hidden="true">
                <span></span>
              </div>
              <div class="transcript-panel">
                <span id="voiceStatus">Tap speak, answer out loud, then send the transcript.</span>
                <p id="transcriptText">Your spoken answer will appear here.</p>
              </div>
            </div>
          </div>
          <div class="action-row">
            <button id="replayPromptButton" class="ghost-button" type="button"><span aria-hidden="true">Play</span>Replay prompt</button>
            <button id="hintButton" class="ghost-button" type="button"><span aria-hidden="true">?</span>Hint</button>
            <button id="submitButton" class="primary-button" type="button"><span aria-hidden="true">OK</span>Send transcript</button>
          </div>
        </div>

        <aside class="mission-panel">
          <div class="section-heading">
            <p class="eyebrow">Conversation Coach</p>
            <h2 id="missionTitle">Voice mode</h2>
          </div>
          <p id="missionDescription"></p>
          <div class="progress-track" aria-label="Round progress"><div id="progressFill"></div></div>
          <div id="hintPanel" class="hint-panel" hidden></div>
          <div id="roundFeedback" class="evaluation-panel" hidden></div>
        </aside>
      </section>

      <section id="feedbackScreen" class="workspace" aria-labelledby="feedbackTitle">
        <div class="feedback-panel">
          <div class="level-badge" id="levelBadge">CEFR A1</div>
          <div class="section-heading">
            <p class="eyebrow">AI Audio Feedback</p>
            <h2 id="feedbackTitle">Session complete</h2>
          </div>
          <p id="feedbackSummary"></p>
          <div class="metric-grid" id="metricGrid"></div>
          <div id="feedbackDetails" class="feedback-list"></div>
          <div class="action-row">
            <button id="replayAudioButton" class="ghost-button" type="button"><span aria-hidden="true">Again</span>Replay audio</button>
            <button id="newSessionButton" class="primary-button" type="button"><span aria-hidden="true">New</span>New session</button>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
